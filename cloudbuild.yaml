steps:
  - name: gcr.io/k8s-skaffold/pack
    args:
      - build
      - asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/swp-be:$COMMIT_SHA
      - --builder
      - gcr.io/buildpacks/builder
      - --publish

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - carrerrmap
      - --image
      - asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/swp-be:$COMMIT_SHA
      - --region
      - asia-northeast1
      - --platform
      - managed
      - --allow-unauthenticated

images:
  - asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/swp-be:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
